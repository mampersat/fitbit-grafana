name: Build and Push Docker Image to Docker Hub

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'Fitbit_Fetch.py'
      - 'compose.yml'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/prod.push.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: thisisarpanghosh/fitbit-fetch-data

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build the Docker image (multi-arch)
        run: docker buildx build --platform linux/amd64 --load -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test the Docker image
        run: docker compose up -d

  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Derive branch-safe image tag
        id: branch_tag
        run: |
          RAW_BRANCH="${GITHUB_REF_NAME}"
          SAFE_TAG=$(echo "${RAW_BRANCH}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')
          if [ -z "${SAFE_TAG}" ]; then
            SAFE_TAG="branch"
          fi
          echo "safe_tag=${SAFE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch_tag.outputs.safe_tag }}
