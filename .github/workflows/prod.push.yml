name: Build and Push Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'Fitbit_Fetch.py'
      - 'compose.yml'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/prod.push.yml'

env:
  DOCKERHUB_IMAGE: docker.io/thisisarpanghosh/fitbit-fetch-data

permissions:
  contents: read
  packages: write

jobs:
  push_to_registry:
    name: Push Docker image to registries
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Derive image names and tags
        id: image_meta
        run: |
          GHCR_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          GHCR_IMAGE="ghcr.io/${GHCR_OWNER}/fitbit-fetch-data"
          LATEST_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)

          {
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "latest_git_tag=${LATEST_GIT_TAG}"
            echo "tags<<EOF"
            echo "${DOCKERHUB_IMAGE}:latest"
            echo "${GHCR_IMAGE}:latest"
            if [ -n "${LATEST_GIT_TAG}" ]; then
              echo "${DOCKERHUB_IMAGE}:${LATEST_GIT_TAG}"
              echo "${GHCR_IMAGE}:${LATEST_GIT_TAG}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_meta.outputs.tags }}
